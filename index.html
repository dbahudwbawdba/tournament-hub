<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R6 Tourney Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: radial-gradient(circle at center, #0f0f1a 0%, #050505 100%);
            color: white; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        .text-gradient { 
            background: linear-gradient(to right, #3b82f6, #a855f7); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .bg-gradient-custom { background: linear-gradient(135deg, #3b82f6, #a855f7); }
        
        /* Fix voor afgesneden tekst en schaling */
        .hero-title {
            line-height: 0.9;
            letter-spacing: -0.05em;
        }

        .page-content {
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease-out;
        }
        .page-content.active {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }

        .nav-item {
            font-size: 14px; /* Groter dan voorheen */
            letter-spacing: 0.1em;
            transition: all 0.3s;
        }
    </style>
</head>
<body class="flex flex-col">

    <nav class="border-b border-white/5 bg-black/40 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-10 h-24 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-custom rounded-xl flex items-center justify-center shadow-lg">
                    <span class="font-black text-sm">R6</span>
                </div>
                <span class="font-black text-2xl uppercase italic tracking-tighter">R6 Tourney <span class="text-gradient">Hub</span></span>
            </div>

            <div class="hidden md:flex gap-12 font-black uppercase">
                <button onclick="switchTab('home')" class="nav-item hover:text-purple-400">Home</button>
                <button onclick="switchTab('tournaments')" class="nav-item hover:text-purple-400">Tournaments</button>
                <button onclick="switchTab('leaderboard')" class="nav-item hover:text-purple-400">Leaderboards</button>
                <button onclick="switchTab('staff')" class="nav-item hover:text-purple-400">Staff Panel</button>
            </div>

            <button onclick="login()" class="bg-[#5865F2] hover:bg-[#4752c4] px-8 py-3 rounded-2xl font-black text-sm uppercase transition-all transform hover:scale-105">Sign In</button>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-6 py-12">
        
        <div id="home" class="page-content active flex-col items-center text-center">
            <h1 class="hero-title text-[12vw] md:text-[10rem] font-black uppercase mb-2">SIEGE</h1>
            <h1 class="hero-title text-[8vw] md:text-[7rem] font-black text-gradient uppercase italic mb-16">STATION HUB</h1>
            <div class="flex flex-wrap gap-6 justify-center">
                <button onclick="switchTab('tournaments')" class="bg-white text-black px-16 py-5 rounded-2xl font-black uppercase text-xl hover:bg-gradient-custom hover:text-white transition-all transform hover:scale-105 shadow-2xl">View Tournaments</button>
                <button onclick="login()" class="bg-white/5 border border-white/10 px-16 py-5 rounded-2xl font-black uppercase text-xl hover:bg-white/10 transition">Discord Login</button>
            </div>
        </div>

        <div id="tournaments" class="page-content flex-col w-full max-w-6xl">
            <div class="flex flex-col mb-12 border-l-4 border-purple-500 pl-8">
                <h2 class="text-6xl font-black uppercase italic">Tournaments</h2>
                <p class="text-gray-400 text-lg mt-2 uppercase font-bold tracking-[0.2em]">Browse and sign up for community tournaments</p>
            </div>

            <div class="grid grid-cols-1 gap-6">
                <div class="bg-[#111] border border-white/5 rounded-[2.5rem] p-10 flex flex-col md:flex-row justify-between items-center gap-8 hover:border-purple-500/30 transition">
                    <div class="flex-grow">
                        <div class="flex items-center gap-4 mb-4">
                            <h3 class="text-4xl font-black uppercase">NA 2v2</h3>
                            <span class="bg-emerald-500/10 text-emerald-500 text-xs font-black px-4 py-1.5 rounded-full border border-emerald-500/20">OPEN</span>
                        </div>
                        <div class="flex flex-wrap gap-8 text-gray-400 font-bold uppercase tracking-widest text-sm">
                            <span>🎮 2v2</span>
                            <span>👥 8/16 Teams</span>
                            <span>📅 20-4-2026</span>
                        </div>
                        <p class="text-orange-500 font-black text-lg mt-6 italic">🏆 Winners role and leaderboard</p>
                    </div>
                    <button onclick="register()" class="w-full md:w-auto bg-white/5 border border-white/10 hover:border-purple-500 hover:bg-purple-500/10 px-10 py-5 rounded-2xl font-black uppercase text-sm tracking-widest transition-all">
                        Sign in with Discord to register
                    </button>
                </div>
            </div>
        </div>

        <div id="leaderboard" class="page-content flex-col items-center">
            <h2 class="text-7xl font-black text-gradient uppercase italic">Leaderboards</h2>
            <p class="text-gray-500 text-xl mt-8 font-black tracking-widest">Global Rankings Under Maintenance</p>
        </div>

    </main>

    <script>
        let authenticated = false;

        function switchTab(tabId) {
            const sections = document.querySelectorAll('.page-content');
            sections.forEach(s => {
                s.classList.remove('active');
                s.style.display = 'none';
            });
            
            const target = document.getElementById(tabId);
            target.style.display = 'flex';
            // Kleine timeout voor de animatie
            setTimeout(() => target.classList.add('active'), 50);
        }

        function login() {
            authenticated = true;
            alert("Discord OAuth Triggered...");
        }

        function register() {
            if(!authenticated) {
                alert("ACCESS DENIED: Sign in with Discord required.");
            }
        }
    </script>
</body>
</html>
