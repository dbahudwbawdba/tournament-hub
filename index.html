<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siege Station | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; }
        .siege-gradient { background: radial-gradient(circle at 50% 50%, rgba(255, 165, 0, 0.1) 0%, transparent 70%); }
        .card-hover:hover { border-color: rgba(255, 165, 0, 0.4); transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="siege-gradient min-h-screen">

    <nav class="border-b border-white/5 bg-black/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-10">
                <div class="flex items-center gap-2">
                    <span class="text-[#ffa500] font-black text-xl tracking-tighter uppercase">SIEGE</span>
                    <span class="font-light text-xl tracking-tighter uppercase">STATION</span>
                </div>
                <div class="hidden md:flex gap-6 text-[11px] font-black uppercase tracking-widest text-gray-500">
                    <a href="#" class="text-[#ffa500]">Home</a>
                    <a href="#" class="hover:text-white transition">Tournaments</a>
                    <a href="#" class="hover:text-white transition">Leaderboards</a>
                    <a href="#" id="staffBtn" class="hover:text-white transition">Staff Panel</a>
                </div>
            </div>
            <button onclick="loginWithDiscord()" class="bg-[#5865F2] hover:bg-[#4752c4] px-6 py-2.5 rounded-xl font-black text-[11px] uppercase tracking-wider transition shadow-lg">
                Sign in with Discord
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-20 text-center">
        <div class="inline-block px-4 py-1.5 rounded-full border border-[#ffa500]/20 bg-[#ffa500]/5 text-[#ffa500] text-[10px] font-black uppercase tracking-[0.2em] mb-8">
            Professional Security Verified
        </div>
        <h1 class="text-6xl md:text-8xl font-black mb-2 tracking-tighter uppercase leading-none">SIEGE</h1>
        <h1 class="text-5xl md:text-7xl font-black mb-8 text-[#ffa500] uppercase leading-none italic">STATION HUB</h1>
        
        <div class="flex flex-col sm:flex-row gap-4 justify-center mt-12">
            <a href="#tournaments" class="bg-white text-black px-10 py-4 rounded-2xl font-black uppercase tracking-tighter hover:bg-[#ffa500] transition transform hover:scale-105">View Tournaments</a>
            <button class="bg-[#121212] border border-white/10 px-10 py-4 rounded-2xl font-black uppercase tracking-tighter hover:bg-white/5 transition">Join Discord</button>
        </div>

        <section id="tournaments" class="mt-32 text-left">
            <h2 class="text-3xl font-black mb-10 uppercase italic">Featured <span class="text-[#ffa500]">Tournaments</span></h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="tournamentContainer">
                </div>
        </section>
    </main>

    <script>
        // Simpele Discord Login Functie
        function loginWithDiscord() {
            // Vervang dit door je echte Discord OAuth link als je die hebt
            alert("Redirecting to Discord Login...");
        }

        // Voorbeeld data (Dit kun je later uit een database halen)
        const tournaments = [
            { id: 1, title: "Open Cup #01", prize: "€100", category: "5V5 BOMB", date: "20-04-2026" },
            { id: 2, title: "Aim Lab 1V1", prize: "Skins", category: "1V1 AIM", date: "25-04-2026" }
        ];

        // Toon toernooien op de pagina
        const container = document.getElementById('tournamentContainer');
        tournaments.forEach(t => {
            container.innerHTML += `
                <div class="bg-[#121212] border border-white/5 rounded-[2.5rem] overflow-hidden card-hover">
                    <div class="h-32 bg-gradient-to-br from-[#ffa500]/10 to-black flex items-center justify-center border-b border-white/5">
                        <span class="text-[#ffa500]/20 font-black text-4xl uppercase">${t.category}</span>
                    </div>
                    <div class="p-8">
                        <h3 class="text-2xl font-black mb-6 uppercase leading-tight">${t.title}</h3>
                        <div class="flex gap-3 mb-6">
                            <div class="flex-1 bg-black p-3 rounded-xl border border-white/5 text-center">
                                <p class="text-[9px] text-gray-500 font-black uppercase">Prize</p>
                                <p class="font-black text-[#ffa500]">${t.prize}</p>
                            </div>
                            <div class="flex-1 bg-black p-3 rounded-xl border border-white/5 text-center">
                                <p class="text-[9px] text-gray-500 font-black uppercase">Date</p>
                                <p class="font-black">${t.date}</p>
                            </div>
                        </div>
                        <button class="w-full bg-white text-black font-black py-4 rounded-xl uppercase tracking-tighter hover:bg-[#ffa500] transition">Deelnemen</button>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
