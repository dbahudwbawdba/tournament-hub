<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siege Tourneys</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
  background:#07070d;
  color:#fff;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  background:#0b0b12;
  position:sticky;
  top:0;
}
nav ul{
  display:flex;
  gap:50px;
  list-style:none;
}
nav ul li{
  cursor:pointer;
  font-weight:600;
  position:relative;
}
nav ul li::after{
  content:'';
  position:absolute;
  bottom:-6px;
  left:0;
  width:0%;
  height:2px;
  background:#a78bfa;
  transition:0.3s;
}
nav ul li:hover::after{
  width:100%;
}

/* HERO (RESTORED + IMPROVED) */
.hero{
  height:90vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.logo{
  font-size:80px;
  font-weight:800;
  background:linear-gradient(135deg,#6ee7ff,#a78bfa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 40px rgba(120,200,255,0.4);
}

.hero h1{
  font-size:60px;
  font-weight:800;
  margin-top:10px;
}

.hero p{
  opacity:.7;
  margin-top:10px;
}

.button-group{
  display:flex;
  gap:15px;
  margin-top:25px;
}

.btn{
  padding:14px 30px;
  border:none;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
  background:linear-gradient(135deg,#5865F2,#6ee7ff);
  color:white;
  transition:.3s;
}

.btn.secondary{
  background:transparent;
  border:1px solid rgba(255,255,255,0.2);
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 0 25px rgba(120,200,255,0.5);
}

/* TOURNAMENT PAGE (REBUILT PROPERLY) */
.section{
  padding:80px 12%;
}

.header{
  margin-bottom:30px;
}

.header h1{
  font-size:32px;
}

.header p{
  opacity:.6;
}

.controls{
  display:flex;
  gap:15px;
  margin-top:20px;
}

.controls input{
  flex:1;
}

input, select{
  padding:12px;
  border-radius:10px;
  border:none;
  background:#0f0f18;
  color:white;
}

.tourney-grid{
  margin-top:30px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:20px;
}

.card{
  background:#0f0f18;
  padding:20px;
  border-radius:15px;
  transition:.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 20px rgba(120,200,255,0.2);
}

.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:8px;
  font-size:12px;
  margin-bottom:10px;
}

.active{background:#22c55e33;color:#22c55e}
.coming{background:#facc1533;color:#facc15}
.past{background:#ef444433;color:#ef4444}

.hidden{display:none}

/* STAFF */
.dashboard{
  margin-top:30px;
}

.form{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

textarea{
  padding:10px;
  border-radius:10px;
  background:#0f0f18;
  border:none;
  color:white;
}

</style>
</head>
<body>

<nav>
<ul>
<li onclick="showPage('home')">Home</li>
<li onclick="showPage('tourneys')">Tourneys</li>
<li onclick="showPage('leaderboard')">Leaderboard</li>
<li onclick="showPage('staff')">Staff</li>
</ul>
</nav>

<!-- HOME -->
<div id="home" class="page">
<div class="hero">
<div class="logo">R6</div>
<h1>Siege Tourneys</h1>
<p>The official tournament platform</p>

<div class="button-group">
<button class="btn" onclick="loginDiscord()">Login with Discord</button>
<button class="btn secondary" onclick="showPage('tourneys')">View Tournaments</button>
</div>

</div>
</div>

<!-- TOURNAMENTS -->
<div id="tourneys" class="page hidden section">
<div class="header">
<h1>🏆 Tournaments</h1>
<p>Browse and sign up for tournaments</p>

<div class="controls">
<input placeholder="Search tournaments...">
<select>
<option>All Statuses</option>
<option>Active</option>
<option>Coming</option>
<option>Past</option>
</select>
</div>
</div>

<div class="tourney-grid" id="tourneyGrid"></div>
<p id="empty">No tournaments found</p>
</div>

<!-- STAFF -->
<div id="staff" class="page hidden section">
<h1>Staff Panel</h1>
<button class="btn" onclick="staffLogin()">Staff Login</button>

<div id="dashboard" class="dashboard hidden">
<h2>Dashboard</h2>

<div class="form">
<input id="name" placeholder="Tournament Name">
<select id="category">
<option value="active">Active</option>
<option value="coming">Coming</option>
<option value="past">Past</option>
</select>
<input id="date" type="date">
<textarea id="info" placeholder="Tournament Info"></textarea>
<button class="btn" onclick="createTournament()">Publish</button>
</div>
</div>
</div>

<script>
let tournaments=[];

function showPage(p){
document.querySelectorAll('.page').forEach(el=>el.classList.add('hidden'));
document.getElementById(p).classList.remove('hidden');
}

function loginDiscord(){alert('Discord OAuth later')}

function staffLogin(){
let pass=prompt('Enter staff password');
if(pass==='admin'){
document.getElementById('dashboard').classList.remove('hidden');
}
}

function createTournament(){
let t={
name:name.value,
cat:category.value,
info:info.value
};

tournaments.push(t);
render();
}

function render(){
let grid=document.getElementById('tourneyGrid');
grid.innerHTML='';

if(tournaments.length===0){
empty.style.display='block';
return;
}

empty.style.display='none';

tournaments.forEach(t=>{
let div=document.createElement('div');
div.className='card';
div.innerHTML=`
<span class="badge ${t.cat}">${t.cat}</span>
<h3>${t.name}</h3>
<p>${t.info}</p>
`;

grid.appendChild(div);
});
}
</script>

</body>
</html>
