<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R6 Tourney Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; overflow-x: hidden; }
        .text-gradient { background: linear-gradient(to right, #3b82f6, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bg-gradient-custom { background: linear-gradient(135deg, #3b82f6, #a855f7); }
        .hidden-content { display: none; opacity: 0; transform: scale(0.95); transition: all 0.4s ease; }
        .show-content { display: block; opacity: 1; transform: scale(1); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade { animation: fadeIn 0.5s ease-in; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="border-b border-white/5 bg-black/40 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-8 h-20 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-gradient-custom rounded-md"></div>
                <span class="font-black tracking-tighter uppercase italic">R6 Tourney <span class="text-gradient">Hub</span></span>
            </div>

            <div class="hidden md:flex gap-10 text-[10px] font-black uppercase tracking-[0.2em] text-gray-500">
                <button onclick="showPage('home')" class="hover:text-white transition">Home</button>
                <button onclick="showPage('tournaments')" class="hover:text-white transition">Tournaments</button>
                <button onclick="showPage('leaderboard')" class="hover:text-white transition">Leaderboards</button>
                <button onclick="showPage('staff')" class="hover:text-white transition">Staff Panel</button>
            </div>

            <button onclick="login()" class="bg-[#5865F2] px-6 py-2 rounded-xl font-bold text-[11px] uppercase shadow-lg shadow-blue-500/10">Sign In</button>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6 relative">
        
        <div id="home" class="text-center animate-fade">
            <h1 class="text-8xl font-black tracking-tighter uppercase mb-2">SIEGE</h1>
            <h1 class="text-7xl font-black text-gradient uppercase italic mb-12">STATION HUB</h1>
            <div class="flex gap-4 justify-center">
                <button onclick="showPage('tournaments')" class="bg-white text-black px-10 py-4 rounded-2xl font-black uppercase tracking-tighter hover:bg-gradient-custom hover:text-white transition transform hover:scale-105">View Tournaments</button>
                <button onclick="login()" class="bg-[#111] border border-white/10 px-10 py-4 rounded-2xl font-black uppercase tracking-tighter transition">Discord Login</button>
            </div>
        </div>

        <div id="tournaments" class="hidden-content w-full max-w-5xl">
            <h2 class="text-4xl font-black mb-10 uppercase italic text-gradient">Active Tournaments</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-[#0e0e0e] border border-white/5 p-8 rounded-[2rem]">
                    <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">5v5 Bomb</span>
                    <h3 class="text-2xl font-black mt-2 mb-6">OPEN CUP #01</h3>
                    <button onclick="checkAuth()" class="w-full bg-gradient-custom py-4 rounded-xl font-black uppercase tracking-widest hover:opacity-80 transition">Register Now</button>
                </div>
                <div class="bg-[#0e0e0e] border border-white/5 p-8 rounded-[2rem]">
                    <span class="text-[10px] font-bold text-purple-400 uppercase tracking-widest">1v1 Aim</span>
                    <h3 class="text-2xl font-black mt-2 mb-6">AIM LABS CLASH</h3>
                    <button onclick="checkAuth()" class="w-full bg-gradient-custom py-4 rounded-xl font-black uppercase tracking-widest hover:opacity-80 transition">Register Now</button>
                </div>
            </div>
        </div>

        <div id="leaderboard" class="hidden-content text-center">
            <h2 class="text-5xl font-black text-gradient uppercase italic">Leaderboards</h2>
            <p class="text-gray-500 mt-4 uppercase font-bold tracking-widest">Rankings coming soon...</p>
        </div>

        <div id="staff" class="hidden-content text-center">
            <h2 class="text-5xl font-black text-gradient uppercase italic">Staff Panel</h2>
            <p class="text-gray-500 mt-4 uppercase font-bold tracking-widest">Authorized Access Only</p>
        </div>

    </main>

    <script>
        let isLoggedIn = false; // Simpele check

        function showPage(pageId) {
            // Verberg alle pagina's
            document.querySelectorAll('main > div').forEach(div => {
                div.classList.remove('show-content');
                div.classList.add('hidden-content');
            });
            // Toon de gekozen pagina
            const target = document.getElementById(pageId);
            target.classList.remove('hidden-content');
            setTimeout(() => target.classList.add('show-content'), 10);
        }

        function login() {
            isLoggedIn = true;
            alert("Discord login successful!");
        }

        function checkAuth() {
            if (!isLoggedIn) {
                alert("ACCESS DENIED: You must login with Discord to register!");
            } else {
                alert("Registration successful! Good luck.");
            }
        }
    </script>
</body>
</html>
