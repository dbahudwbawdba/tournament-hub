<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siege Tourneys</title>
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        .logo {
            width: 100px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3rem;
            font-weight: bold;
            color: #f0f6fc;
        }

        h2 {
            font-size: 1.5rem;
            color: #58a6ff;
        }

        button {
            background-color: #238636;
            color: #ffffff;
            border: none;
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            margin: 10px;
        }

        button:hover {
            background-color: #2ea043;
            transform: scale(1.05);
        }

        .hidden {
            display: none;
        }

        .nav-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #161b22;
            color: #58a6ff;
            border: 1px solid #30363d;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .nav-button:hover {
            background-color: #21262d;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Siege Tourneys Logo" class="logo">
        <h1>Siege Tourneys</h1>
        <h2>The ultimate R6 tournament platform</h2>
        <button id="login-discord">Login with Discord</button>
    </div>

    <button class="nav-button" id="nav-toggle">Menu</button>

    <div id="nav-menu" class="hidden">
        <nav>
            <ul>
                <li><a href="#tourneys">Tourneys</a></li>
                <li><a href="#leaderboard">Leaderboard</a></li>
                <li><a href="#staff">Staff</a></li>
            </ul>
        </nav>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginButton = document.getElementById('login-discord');
            const navToggle = document.getElementById('nav-toggle');
            const navMenu = document.getElementById('nav-menu');

            loginButton.addEventListener('click', () => {
                alert('Redirecting to Discord login...');
            });

            navToggle.addEventListener('click', () => {
                navMenu.classList.toggle('hidden');
            });
        });
    </script>
</body>
</html>
