<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siege Station Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #050505;
            background-image: radial-gradient(circle at center, #11111a 0%, #050505 100%);
            color: white; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        .text-gradient { 
            background: linear-gradient(to right, #3b82f6, #a855f7); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .hero-title {
            font-size: clamp(3rem, 12vw, 10rem);
            line-height: 0.85;
            letter-spacing: -0.04em;
        }
        .hero-subtitle {
            font-size: clamp(2rem, 8vw, 7rem);
            line-height: 1;
        }
        .page-content {
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .page-content.active {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }
        .nav-link {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.05em;
            color: #9ca3af;
            transition: color 0.2s;
        }
        .nav-link:hover, .nav-link.active-tab {
            color: white;
        }
        .glass-card {
            background: rgba(17, 17, 17, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="flex flex-col">

    <nav class="border-b border-white/5 bg-black/60 backdrop-blur-2xl sticky top-0 z-50">
        <div class="max-w-[1400px] mx-auto px-8 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <span class="font-black text-[10px]">R6</span>
                </div>
                <span class="font-black text-xl uppercase italic tracking-tighter">R6 Tourney <span class="text-gradient">Hub</span></span>
            </div>

            <div class="hidden md:flex gap-10">
                <button onclick="switchTab('home')" class="nav-link uppercase">Dashboard</button>
                <button onclick="switchTab('tournaments')" class="nav-link uppercase">Tournaments</button>
                <button onclick="switchTab('leaderboard')" class="nav-link uppercase">Teams</button>
                <button onclick="switchTab('leaderboard')" class="nav-link uppercase">Leaderboard</button>
            </div>

            <button onclick="login()" class="bg-[#5865F2] hover:bg-[#4752c4] px-6 py-2.5 rounded-xl font-black text-xs uppercase transition-all shadow-lg shadow-blue-500/10 flex items-center gap-2">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037 19.736 19.736 0 0 0-4.885 1.515.069.069 0 0 0-.032.027C.533 9.048-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994.021-.041.001-.09-.041-.106a13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.23 10.23 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.196.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
                Sign in with Discord
            </button>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center px-6">
        
        <div id="home" class="page-content active flex-col items-center text-center py-20">
            <h1 class="hero-title font-black uppercase">SIEGE</h1>
            <h1 class="hero-subtitle font-black text-gradient uppercase italic mb-10">STATION HUB</h1>
            <p class="text-gray-500 uppercase font-bold tracking-[0.3em] text-sm mb-12">The official tournament platform for the community</p>
            <div class="flex flex-wrap gap-6 justify-center">
                <button onclick="switchTab('tournaments')" class="bg-white text-black px-12 py-4 rounded-2xl font-black uppercase text-sm hover:scale-105 transition-all shadow-xl">View Tournaments</button>
                <button onclick="login()" class="bg-white/5 border border-white/10 px-12 py-4 rounded-2xl font-black uppercase text-sm hover:bg-white/10 transition-all">Discord Login</button>
            </div>
        </div>

        <div id="tournaments" class="page-content flex-col w-full max-w-5xl py-12">
            <div class="flex items-center gap-5 mb-12">
                <span class="text-4xl">🏆</span>
                <div>
                    <h2 class="text-5xl font-black uppercase italic leading-none">Tournaments</h2>
                    <p class="text-gray-500 text-sm mt-2 uppercase font-bold tracking-widest">Browse and sign up for community tournaments</p>
                </div>
            </div>

            <div class="glass-card rounded-[2.5rem] p-10 flex flex-col md:flex-row justify-between items-center gap-10 hover:border-purple-500/40 transition-all duration-500">
                <div class="flex-grow">
                    <div class="flex items-center gap-4 mb-5">
                        <h3 class="text-3xl font-black uppercase tracking-tight">NA 2v2</h3>
                        <span class="bg-emerald-500/10 text-emerald-500 text-[10px] font-black px-4 py-1.5 rounded-full border border-emerald-500/20">OPEN</span>
                    </div>
                    <div class="grid grid-cols-2 gap-y-4 gap-x-10 text-gray-400 font-bold uppercase tracking-widest text-xs">
                        <span class="flex items-center gap-3">🎮 2v2</span>
                        <span class="flex items-center gap-3">👥 8/16 Teams</span>
                        <span class="flex items-center gap-3">📅 20-4-2026</span>
                        <span class="text-orange-500 italic">🏆 Winners role & leaderboard</span>
                    </div>
                </div>
                <button onclick="register()" class="w-full md:w-64 bg-white/5 border border-white/10 hover:border-purple-500/50 hover:bg-purple-500/5 py-5 rounded-2xl font-black uppercase text-[10px] tracking-[0.15em] transition-all text-gray-400">
                    Sign in with Discord to register
                </button>
            </div>
        </div>

    </main>

    <script>
        let isAuth = false;

        function switchTab(tabId) {
            const current = document.querySelector('.page-content.active');
            if(current) current.classList.remove('active');
            
            setTimeout(() => {
                document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
                const target = document.getElementById(tabId);
                target.classList.add('active');
            }, 50);
        }

        function login() {
            isAuth = true;
            alert("Redirecting to Discord...");
        }

        function register() {
            if(!isAuth) alert("You must login with Discord first!");
        }
    </script>
</body>
</html>
