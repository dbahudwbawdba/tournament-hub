<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siege Tourneys</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#05050a;color:#fff}

nav{display:flex;justify-content:center;align-items:center;padding:20px;background:#0d0d14;position:sticky;top:0;z-index:100}
nav ul{display:flex;gap:50px;list-style:none}
nav ul li{cursor:pointer;font-weight:600;transition:.3s}
nav ul li:hover{color:#a78bfa}

.hero{height:90vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.logo{font-size:70px;font-weight:800;background:linear-gradient(135deg,#6ee7ff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.btn{margin-top:20px;padding:12px 25px;border:none;border-radius:10px;background:linear-gradient(135deg,#5865F2,#6ee7ff);color:#fff;font-weight:600;cursor:pointer;transition:.3s}
.btn:hover{transform:scale(1.05);box-shadow:0 0 20px #6ee7ff}

.section{padding:60px 10%}
.card{background:#0f0f1a;padding:20px;border-radius:12px;margin:10px 0;transition:.3s}
.card:hover{transform:translateY(-5px)}
.hidden{display:none}
input,textarea,select{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none;background:#111;color:#fff}

.searchBar{display:flex;gap:10px;margin-bottom:20px}
.searchBar input{flex:1}

</style>
</head>
<body>

<nav>
<ul>
<li onclick="showPage('home')">Home</li>
<li onclick="showPage('tourneys')">Tournaments</li>
<li onclick="showPage('leaderboard')">Leaderboard</li>
<li onclick="showPage('staff')">Staff</li>
</ul>
</nav>

<!-- HOME -->
<div id="home" class="page">
<div class="hero">
<div class="logo">R6</div>
<h1>Siege Tourneys</h1>
<p>Competitive R6 tournaments</p>
<button class="btn" onclick="loginDiscord()">Login with Discord</button>
<button class="btn" onclick="showPage('tourneys')">View Tournaments</button>
</div>
</div>

<!-- TOURNAMENT PAGE -->
<div id="tourneys" class="page hidden section">
<h1>Tournaments</h1>
<p>Browse and join tournaments</p>

<div class="searchBar">
<input placeholder="Search tournaments...">
<select>
<option>All Status</option>
<option>Active</option>
<option>Coming</option>
<option>Past</option>
</select>
</div>

<div id="tourneyList"></div>

<p id="empty">No tournaments found</p>
</div>

<!-- LEADERBOARD -->
<div id="leaderboard" class="page hidden section">
<h2>Leaderboard</h2>
<input placeholder="Search player..." onkeyup="searchLeaderboard(this.value)">
<div id="leaderboardList"></div>
</div>

<!-- STAFF -->
<div id="staff" class="page hidden section">
<h2>Staff Team</h2>
<div class="card">Owner - You</div>

<button class="btn" onclick="staffLogin()">Staff Login</button>

<div id="dashboard" class="hidden">
<h2>Staff Dashboard</h2>
<button class="btn" onclick="toggleCreate()">Create Tournament</button>

<div id="create" class="hidden">
<input id="name" placeholder="Tournament Name">
<select id="category">
<option>Active</option>
<option>Coming</option>
<option>Past</option>
</select>
<input id="date" type="date">
<textarea id="info" placeholder="Tournament Info"></textarea>
<button class="btn" onclick="publishTournament()">Publish</button>
</div>
</div>
</div>

<script>
let tournaments=[];
let leaderboard=[{name:'Player1',points:120}];

function showPage(p){
document.querySelectorAll('.page').forEach(x=>x.classList.add('hidden'));
document.getElementById(p).classList.remove('hidden');
}

function loginDiscord(){alert('Discord login later')}

function staffLogin(){
let pass=prompt('Password');
if(pass==='admin'){
document.getElementById('dashboard').classList.remove('hidden');
}
}

function toggleCreate(){
document.getElementById('create').classList.toggle('hidden');
}

function publishTournament(){
let t={
name:document.getElementById('name').value,
cat:document.getElementById('category').value,
info:document.getElementById('info').value
};

tournaments.push(t);
renderTournaments();
}

function renderTournaments(){
let list=document.getElementById('tourneyList');
list.innerHTML='';

if(tournaments.length===0){
document.getElementById('empty').style.display='block';
return;
}

document.getElementById('empty').style.display='none';

tournaments.forEach(t=>{
let el=document.createElement('div');
el.className='card';
el.innerHTML=`<h3>${t.name}</h3><p>${t.cat}</p><p>${t.info}</p>`;
list.appendChild(el);
});
}

function loadLeaderboard(){
let list=document.getElementById('leaderboardList');
leaderboard.forEach(p=>{
let el=document.createElement('div');
el.className='card';
el.innerText=`${p.name} - ${p.points}`;
list.appendChild(el);
});
}

function searchLeaderboard(val){
let list=document.getElementById('leaderboardList');
list.innerHTML='';
leaderboard.filter(p=>p.name.toLowerCase().includes(val.toLowerCase()))
.forEach(p=>{
let el=document.createElement('div');
el.className='card';
el.innerText=`${p.name} - ${p.points}`;
list.appendChild(el);
});
}

loadLeaderboard();
</script>

</body>
</html>
